# ==============================================================================
# CẤU HÌNH MẪU ZIGBEE2MQTT - SO SÁNH CẤU HÌNH MẶC ĐỊNH & CẤU HÌNH AN TOÀN
# File này mô tả các thiết lập bảo mật để vận hành Zigbee Coordinator an toàn.
# ==============================================================================

# Home Assistant Integration
homeassistant: true

# Thiết lập kết nối đến MQTT Broker (Mosquitto)
mqtt:
  # AN TOÀN: Sử dụng cổng 8883 (Mã hóa TLS) thay vì 1883 (Không mã hóa)
  # Mặc định (Yếu): server: 'mqtt://localhost:1883'
  server: 'mqtts://localhost:8883'
  
  # AN TOÀN: Luôn cấu hình tài khẩu và mật khẩu mạnh để truy cập MQTT
  # Mặc định (Yếu): Không khai báo (nếu Broker cho phép anonymous)
  user: 'secure_smarthome_gateway'
  password: 'Strong_MQTT_Password_9876!'
  
  # Cấu hình chứng chỉ TLS (Bắt buộc khi dùng mqtts://)
  ca: /app/data/certs/ca.crt
  cert: /app/data/certs/client.crt
  key: /app/data/certs/client.key

# Cấu hình cổng giao tiếp với thiết bị USB Dongle (CC2652P / CC2531)
serial:
  port: /dev/ttyUSB0
  # Có thể cấu hình chip giao tiếp phụ thuộc vào phần cứng (zstack, deconz, ezsp)
  adapter: zstack

# Cấu hình mạng nâng cao (Advanced Network Settings)
advanced:
  # AN TOÀN: Đặt PAN ID ngẫu nhiên thay vì sử dụng mặc định
  # Mặc định (Yếu): pan_id: 0x1a2b
  pan_id: 0x4f8d

  # AN TOÀN: Đặt Extended PAN ID ngẫu nhiên thay vì mặc định (0xdddddddddddddddd)
  # Mặc định (Yếu): ext_pan_id: [0xdd, 0xdd, 0xdd, 0xdd, 0xdd, 0xdd, 0xdd, 0xdd]
  ext_pan_id: [0x2e, 0xa5, 0x9c, 0x11, 0x8a, 0xbe, 0x3d, 0x74]

  # AN TOÀN: Lựa chọn kênh truyền ít bị nhiễu Wi-Fi (khuyên dùng 15, 20, 25 hoặc 26)
  # Mặc định (Yếu): channel: 11 (trùng dải kênh 1 của Wi-Fi 2.4GHz)
  channel: 25

  # AN TOÀN: Sinh ngẫu nhiên Khóa mạng (Network Key)
  # Mặc định (Yếu): Sử dụng khóa mặc định công khai:
  # network_key: [1, 3, 5, 7, 9, 11, 13, 15, 0, 2, 4, 6, 8, 10, 12, 13]
  # Khuyến nghị (Mạnh): Sử dụng từ khóa 'generate' để Zigbee2MQTT tự sinh ngẫu nhiên khi khởi chạy lần đầu
  network_key: generate

  # AN TOÀN: Bật cơ chế mã hóa truyền tải ứng dụng (APS)
  # Mặc định (Yếu): false
  transmit_power: 20

# Cấu hình thiết bị gia nhập mạng (Permit Join)
# AN TOÀN: Phải đặt là false. Chỉ bật thủ công khi ghép cặp thiết bị mới.
# Mặc định (Yếu): permit_join: true (Mạng luôn mở, bất cứ thiết bị lạ nào cũng có thể join)
permit_join: false

# Cấu hình giao diện Web (Frontend Web UI)
frontend:
  # AN TOÀN: Đổi cổng mặc định (8080) và bắt buộc khai báo tài khoản đăng nhập bảo mật
  # Mặc định (Yếu): port: 8080 và không cấu hình auth_token/credentials
  port: 8443
  host: 127.0.0.1 # Chỉ lắng nghe trên giao diện cục bộ (để reverse proxy bằng Nginx)
  
  # Cấu hình xác thực cho Frontend
  auth_token: 'Super_Secure_Frontend_Token_Example_12345!'
